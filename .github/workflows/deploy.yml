name: Update Matches & Deploy
on:
  schedule:
    - cron: '26 11 * * *'  # Chạy test lúc 11:26 UTC (18:26 GMT+7)
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Crawler
        run: echo "Tạm thời bỏ qua crawler để test"
      - name: Build static site
        run: python3 build.py
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update matches, index.html and markdown odds [skip ci]" && git push)
