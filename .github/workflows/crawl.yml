name: Crawl Odds and Deploy Pages

on:
  schedule:
    # 15:45 GMT+7 tương ứng với 08:45 UTC
    - cron: '45 8 * * *'
  workflow_dispatch: # Cho phép kích hoạt bằng tay từ giao diện GitHub

permissions:
  contents: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Crawler
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python crawler.py

    - name: Build Static Site
      run: python build.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/matches.json index.html markdown/ flags/
        # Chỉ commit nếu có thay đổi để tránh lỗi workflow
        git diff-index --quiet HEAD || git commit -m "Auto-update matches, index.html and markdown odds [skip ci]"
        git push
