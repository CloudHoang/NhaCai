<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Betting Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .login-card {
            max-width: 400px;
            margin: 0 auto;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card card p-4">
        <h4 class="mb-1 text-center">🔐 Admin Login</h4>
        <p class="text-muted text-center small mb-3">Betting Tracker · Upload CSV &amp; Nhập tỷ số</p>

        {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="mb-3">
                <label for="password" class="form-label fw-bold">Mật khẩu</label>
                <input type="password" class="form-control form-control-lg" id="password" name="password" required autofocus>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Đăng nhập</button>
            </div>
        </form>
        <p class="text-muted small text-center mt-3 mb-0">
            <a href="/" class="text-decoration-none">← Về trang chủ</a>
        </p>
    </div>
</div>
</body>
</html>
